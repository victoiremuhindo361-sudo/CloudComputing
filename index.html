<!DOCTYPE html>
<html>
<head>
  <title>Résultat du vote</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Résultats du vote</h2>
<canvas id="myChart"></canvas>

<script>
async function fetchData() {
  const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSsIzjztghlw1MyDjQHgzpUME_OR-jrF1GD7iNuUNMDlZ-Xr0-HgEvYw_Yv_4Q4L8PzInv0VK_7HWyv/pubhtml");
  const data = await response.text();

  const rows = data.split("\n").slice(1);
  let votes = {};

  rows.forEach(row => {
    const cols = row.split(",");
    const choix = cols[1]; // colonne réponse

    if (choix) {
      votes[choix] = (votes[choix] || 0) + 1;
    }
  });

  return votes;
}

async function drawChart() {
  const votes = await fetchData();

  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'pie',
    data: {
      labels: Object.keys(votes),
      datasets: [{
        data: Object.values(votes)
      }]
    }
  });
}

drawChart();

// mise à jour automatique toutes les 10 secondes
setInterval(() => {
  location.reload();
}, 10000);
</script>

</body>
</html>
